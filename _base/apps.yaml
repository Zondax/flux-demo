apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: ${namespace}
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  serviceAccountName: ${serviceAccountKust}
  path: ./apps
  prune: true
  timeout: 1m
  postBuild:
    substitute:
      namespace: ${namespace}
      serviceAccountHelm: ${serviceAccountHelm}
      serviceAccountKust: ${serviceAccountKust}
