apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# NO `namespace:` rewrite — the vendored csi-driver-host-path manifest
# ships its own `csi-hostpath-storage` namespace and rebinds every
# subject to it. Letting the apps/ Kustomization's `namespace: ${namespace}`
# template trick land here would remap the plugin StatefulSet + RBAC into
# `flux-system` and break the driver registration.
labels:
  - includeSelectors: false
    pairs:
      flux.zondax.io/bootstrapping: flux-demo
      flux.zondax.io/src: flux-demo
      flux.zondax.io/component: storage
resources:
  - csi-driver-host-path.yaml
