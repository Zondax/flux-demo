apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: my-app3
spec:
  interval: 10m
  url: oci://registry-1.docker.io/zondax/demo
  ref:
    tag: 0.0.2-0
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: my-app3
spec:
  serviceAccountName: ${serviceAccountHelm}
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: my-app3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: false
  targetNamespace: my-app3
  releaseName: my-app3
  values:
    enabled: true
    replicas: 1
    # StatefulSet so the PVC is a per-pod claim — gives us the storage
    # usage metric Kunobi renders alongside CPU/memory.
    kind: StatefulSet
    fullname: my-app3
    image:
      repository: alpine
      tag: latest
      pullPolicy: IfNotPresent
      pullSecrets: []
      command: [ "/bin/sh", "-c", "--" ]
      # Light periodic write so the PVC accumulates a few hundred KB over
      # time without growing meaningfully. Combined with the sleep loop
      # it produces a non-zero-but-quiet CPU/memory signal too.
      args: [ "while true; do date >> /data/heartbeat.log && echo $(date) workload ${MY_DEPLOY_NAME} pod ${MY_POD_NAME} && sleep 30; done;" ]
    secret:
      create: true
      name: ""
      key: setup-key
      type: Opaque
      value: MY_SECRET_VALUE
    persistence:
      enabled: true
      size: 100Mi
      mountPath: /data
      accessModes:
        - ReadWriteOnce
    resources:
      limits:
        cpu: 50m
        memory: 16Mi
      requests:
        cpu: 10m
        memory: 8Mi
