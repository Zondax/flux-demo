apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
spec:
  interval: 1h
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
spec:
  serviceAccountName: ${serviceAccountHelm}
  interval: 10m
  chart:
    spec:
      chart: prometheus
      version: 29.x
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: false
  targetNamespace: monitoring
  releaseName: prometheus
  values:
    # Lightweight footprint — disable everything we don't need for the
    # mkt-real metrics walkthrough (pod CPU/memory + PVC usage charts).
    # The server alone is ~150Mi RAM with in-memory storage.
    alertmanager:
      enabled: false
    prometheus-pushgateway:
      enabled: false
    server:
      retention: 2h
      persistentVolume:
        enabled: false
      resources:
        requests:
          cpu: 50m
          memory: 400Mi
        limits:
          memory: 1Gi
    prometheus-node-exporter:
      enabled: false
    kube-state-metrics:
      enabled: true
